<!DOCTYPE html>
<html>
<head>
  <title>WebSocket Chat</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    input { width: 70%; padding: 8px; }
    button { padding: 8px 16px; }
    .message { margin: 4px 0; padding: 4px; background: #f0f0f0; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>WebSocket Chat</h2>
  <div id="status" style="color: red">Disconnected</div>
  <br>
  <div id="chat"></div>
  <input id="msg" placeholder="Type a message..." />
  <button onclick="send()">Send</button>

  <script>
    const ws = new WebSocket("ws://localhost:8765");

    ws.onopen = () => {
      document.getElementById("status").textContent = "Connected ✓";
      document.getElementById("status").style.color = "green";
    };

    ws.onmessage = (event) => {
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = event.data;
      document.getElementById("chat").appendChild(div);
    };

    ws.onclose = () => {
      document.getElementById("status").textContent = "Disconnected";
      document.getElementById("status").style.color = "red";
    };

    function send() {
      const input = document.getElementById("msg");
      ws.send(input.value);
      input.value = "";
    }

    document.getElementById("msg").addEventListener("keypress", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
