<!DOCTYPE html>
<html>
<head>
  <title>FastAPI WebSocket Chat</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #chat { border: 1px solid #ccc; height: 350px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    .message { margin: 6px 0; padding: 6px 10px; background: #f0f0f0; border-radius: 6px; }
    .join { color: green; font-style: italic; }
    .leave { color: red; font-style: italic; }
    input { width: 65%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; margin-left: 4px; border-radius: 4px; border: none; background: #4CAF50; color: white; cursor: pointer; }
    #status { padding: 6px; border-radius: 4px; margin-bottom: 10px; }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h2>FastAPI WebSocket Chat — Day 9</h2>

  <div>
    <input id="username" placeholder="Enter your name" />
    <button onclick="connect()">Join Chat</button>
  </div>
  <br>

  <div id="status" class="disconnected">Not connected</div>
  <div id="chat"></div>

  <input id="msg" placeholder="Type a message..." disabled />
  <button onclick="send()" id="sendBtn" disabled>Send</button>

  <script>
    let ws;
    let username;

    function connect() {
      username = document.getElementById("username").value.trim();
      if (!username) {
        alert("Please enter your name first!");
        return;
      }

      // Connect to FastAPI WebSocket with username in URL
      ws = new WebSocket(`ws://localhost:8000/ws/${username}`);

      ws.onopen = () => {
        document.getElementById("status").textContent = `Connected as ${username} ✓`;
        document.getElementById("status").className = "connected";
        document.getElementById("msg").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("username").disabled = true;
      };

      ws.onmessage = (event) => {
        addMessage(event.data);
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = "Disconnected";
        document.getElementById("status").className = "disconnected";
      };
    }

    function send() {
      const input = document.getElementById("msg");
      if (input.value.trim()) {
        ws.send(input.value);
        input.value = "";
      }
    }

    function addMessage(text) {
      const div = document.createElement("div");
      div.className = "message";
      if (text.includes("joined")) div.className += " join";
      if (text.includes("left")) div.className += " leave";
      div.textContent = text;
      const chat = document.getElementById("chat");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("msg").addEventListener("keypress", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
